name: Deploy Hugo site to Azure Web App

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_BASE_URL: "https://ualhmis2026-hmis-lovers.github.io/WeLoveHMIS/"
      HUGO_VERSION: '0.157.0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: ${{ env.HUGO_VERSION }}

      - name: Build site
        run: hugo --minify --baseURL "${{ env.HUGO_BASE_URL }}"
 
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'hmis-lovers-c4fqd8ekf5fec4gs'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./public

# Notes:
# - Create the secret `AZURE_WEBAPP_PUBLISH_PROFILE` in your GitHub repo settings (Settings → Secrets → Actions)
#   with the full XML publish profile you download from the App Service "Get publish profile" action in the Azure Portal.
# - The workflow builds the Hugo `public/` folder and deploys it using the publish profile. No other Azure credentials are required.