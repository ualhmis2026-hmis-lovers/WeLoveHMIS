server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    
    # Root del sitio
    root /var/www/html;
    index index.html index.htm;

    # Acceso al sitio - IMPORTANTE: buscar index.html en directorios
    location / {
        try_files $uri $uri/index.html =404;
    }

    # Assets estáticos - cachear agresivamente
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # Prevenir acceso a archivos ocultos
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Logging
    access_log /var/log/nginx/welovehmis_access.log;
    error_log /var/log/nginx/welovehmis_error.log;
}

