baseURL: "https://ualhmis2026-hmis-lovers.github.io/WeLoveHMIS/"
languageCode: es-ES
title: WeLoveHMIS
theme: PaperMod
paginate: 10

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

params:
  label:
    text: "WeLoveHMIS"
    icon: /apple-touch-icon.png
    iconHeight: 35
  ShowReadingTime: true
  ShowToc: true
  disableSpecial1stPost: true
  TocOpen: true

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: archives
      name: Archivo
      url: /archives/
      weight: 20
    - identifier: tags
      name: Etiquetas
      url: /tags/
      weight: 30
    - identifier: search
      name: Buscar
      url: /search/
      weight: 40

taxonomies:
  tag: tags
  author: authors

outputs:
  home:
    - HTML
    - RSS
    - JSON
