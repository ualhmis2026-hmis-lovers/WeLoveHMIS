baseURL: "https://ualhmis2026-hmis-lovers.github.io/WeLoveHMIS/"
languageCode: es-ES
title: WeLoveHMIS
theme: PaperMod
paginate: 10

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

params:
  label:
    text: "WeLoveHMIS"
    icon: /apple-touch-icon.png
    iconHeight: 35
  ShowReadingTime: true
  ShowToc: true
  disableSpecial1stPost: true
  TocOpen: true

# Menu entries removed per request (Posts / Archivo / Etiquetas / Buscar)

taxonomies:
  tag: tags
  author: authors

outputs:
  home:
    - HTML
    - RSS
    - JSON
