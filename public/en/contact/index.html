  <div class="post-content"><p>No sabemos aún muy bien <em>por qué querrías contactar con nosotros</em>, pero aquí tienes un formulario de <strong>Formspree</strong> para ello:</p>
<form id="contact-form" class="contact-form" action="https://formspree.io/f/xykbgjqd" method="POST">
  <label for="name">Nombre</label>
  <input id="name" name="name" type="text" required>
<p><label for="email">Correo electrónico</label>
<input id="email" name="_replyto" type="email" required></p>
<p><label for="subject">Asunto</label>
<input id="subject" name="subject" type="text"></p>
<p><label for="message">Mensaje</label></p>
  <textarea id="message" name="message" rows="6" required></textarea>
  <!-- Honeypot field to trap bots (leave empty) -->
  <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">
<p><button type="submit">Enviar mensaje</button></p>
  <div id="contact-form-status" class="contact-status" aria-live="polite"></div>
</form>
