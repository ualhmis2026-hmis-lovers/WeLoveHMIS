{{/* Shortcode: youtube
Usage:
  {{< youtube id="VIDEO_ID" title="Título" start="30" >}}
  or positional: {{< youtube "VIDEO_ID" >}}
*/}}

{{ $id := .Get "id" | default (.Get 0) }}
{{ $title := .Get "title" | default "YouTube video" }}

<div class="youtube-wrapper" style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;max-width:100%;">
  <iframe src="https://www.youtube.com/embed/{{ $id }}{{ if .Get "start" }}?start={{ .Get "start" }}{{ end }}"
    title="{{ $title }}"
    style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen loading="lazy"></iframe>
</div>
